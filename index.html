
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PEO CVN OPN Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<style>
body{font-family:Segoe UI,Arial;background:#0b1220;color:white;margin:0;padding:20px}
.panel{background:#121b2e;border-radius:14px;padding:16px;margin-bottom:18px}
h1{margin-top:0}
table{width:100%;border-collapse:collapse}
th,td{padding:8px;border-bottom:1px solid #2a3957}
td.num{text-align:right}
.status{padding:4px 8px;border-radius:8px;font-size:12px}
.good{background:#1f6f3d}
.watch{background:#7a5d15}
.risk{background:#7a1c1c}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:18px}
canvas{max-height:360px}
</style>
</head>

<body>

<h1>PEO CVN OPN Management Snapshot</h1>

<div class="panel">
Upload Excel: <input type="file" id="file">
</div>

<div class="grid">
<div class="panel"><h3>Hull Obligations (Column J)</h3><canvas id="hullChart"></canvas></div>
<div class="panel"><h3>Project Code Totals (Column K)</h3><canvas id="codeChart"></canvas></div>
</div>

<div class="panel">
<h3>Management Detail</h3>
<table id="table">
<thead>
<tr>
<th>Code</th>
<th>Name</th>
<th>Budget</th>
<th>Commitments</th>
<th>Obligations</th>
<th>Actual</th>
<th>Remaining</th>
<th>Status</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>

<script>

function accounting(v){
if(!v || v===0) return "$ -"
let n=Math.abs(v).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2})
return v<0?`($${n})`:`$${n}`
}

let hullChart,codeChart

document.getElementById('file').addEventListener('change', async e=>{
const file=e.target.files[0]
const data=await file.arrayBuffer()
const wb=XLSX.read(data)
const ws=wb.Sheets[wb.SheetNames[0]]
const rows=XLSX.utils.sheet_to_json(ws,{header:1})

let hullTotals={}
let codeTotals={}

for(let i=1;i<rows.length;i++){
let hull=rows[i][9]
let code=rows[i][10]
let obl=Number(rows[i][6])||0

if(hull){
if(!hullTotals[hull]) hullTotals[hull]=0
hullTotals[hull]+=obl
}

if(code){
if(!codeTotals[code]) codeTotals[code]=0
codeTotals[code]+=obl
}
}

let hullLabels=Object.keys(hullTotals)
let hullData=Object.values(hullTotals)

let codeLabels=Object.keys(codeTotals)
let codeData=Object.values(codeTotals)

if(hullChart) hullChart.destroy()
hullChart=new Chart(document.getElementById("hullChart"),{
type:"bar",
data:{labels:hullLabels,datasets:[{label:"Obligations",data:hullData,backgroundColor:"#4da3ff"}]},
options:{plugins:{legend:{display:false}},scales:{y:{ticks:{callback:v=>"$"+(v/1000000).toFixed(1)+"M"}}}}
})

if(codeChart) codeChart.destroy()
codeChart=new Chart(document.getElementById("codeChart"),{
data:{
labels:codeLabels,
datasets:[
{type:"bar",label:"Total Obligations",data:codeData,backgroundColor:"#15b8a6"},
{type:"line",label:"Distribution",data:codeData,borderColor:"#f5b942"}
]
},
options:{scales:{y:{ticks:{callback:v=>"$"+(v/1000000).toFixed(1)+"M"}}}}
})

})

</script>

</body>
</html>
